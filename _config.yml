title: Dictionary
description: comprehensive, categorized keyword list — covering every layer of the stack a senior/staff engineer should deeply know.
url: https://shivakrishnak.github.io
baseurl: /sk-keys
permalink: pretty

# Theme
remote_theme: just-the-docs/just-the-docs

# Plugins — jekyll-seo-tag and jekyll-include-cache are required by just-the-docs
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-include-cache

# Exclude non-page files from Jekyll build
exclude:
  - README.md
  - Update-MarkdownFrontmatter.ps1
  - GENERATOR_PROMPT.md
  - KEYWORD_GENERATOR_PROMPT.md
  - SINGLE_CATEGORY_GENERATOR_PROMPT.md
  - TECHNICAL_DICTIONARY.md
  - Prompt.md
  - upgrade_b1a.py
  - upgrade_batch1.ps1
  - Gemfile
  - Gemfile.lock
  - vendor/
  - tmp/

# Search — disabled: 1,362 pages produce a ~25MB Lunr index
# Re-enable once content is stable and index size is acceptable
search_enabled: false
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: true
  focus_shortcut_key: 'k'

# Navigation
heading_anchors: true
nav_sort: case_insensitive
nav_fold: true

# Links
aux_links:
  Repository: https://github.com/shivakrishnak/sk-keys
aux_links_new_tab: true

# Appearance
color_scheme: light
back_to_top: true
back_to_top_text: "Back to top"

# ── Copy button on every code block ────────────────────────
enable_copy_code_button: true

# ── Mermaid diagrams (renders ```mermaid fenced blocks) ────
mermaid:
  version: "10.9.0"

# ── Markdown renderer: GitHub Flavored Markdown ────────────
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "highlight"
    block:
      line_numbers: false

# ── Resilient builds — warn on Liquid errors, don't fail ───
liquid:
  error_mode: warn
  strict_filters: false

# ── Compress HTML output ────────────────────────────────────
compress_html:
  clippings: all
  comments: all
  endings: all
  blanklines: false

# ── Compress CSS ────────────────────────────────────────────
sass:
  style: compressed

# ── Footer ─────────────────────────────────────────────────
footer_content: "sk-keys · 1,400+ entries · 50 categories · 9 tiers"
