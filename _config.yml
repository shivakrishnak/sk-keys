title: Dictionary
description: comprehensive, categorized keyword list — covering every layer of the stack a senior/staff engineer should deeply know.

remote_theme: just-the-docs/just-the-docs

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-include-cache

exclude:
  - README.md
  - Update-MarkdownFrontmatter.ps1
  - GENERATOR_PROMPT.md
  - SINGLE_CATEGORY_GENERATOR_PROMPT.md
  - TECHNICAL_DICTIONARY.md
  - Prompt.md
  - upgrade_b1a.py
  - upgrade_batch1.ps1
  - tmp/

url: https://shivakrishnak.github.io
baseurl: /sk-keys

# Search disabled — 1300+ dense pages make the Lunr index too large
search_enabled: false

heading_anchors: true
nav_sort: case_insensitive

# Collapsed nav by default — reduces initial render time
nav_fold: true

aux_links:
  Repository: https://github.com/shivakrishnak/sk-keys

aux_links_new_tab: true

color_scheme: light

back_to_top: true
back_to_top_text: "Back to top"
